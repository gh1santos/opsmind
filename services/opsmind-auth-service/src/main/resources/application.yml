server:
  port: ${AUTH_SERVICE_PORT:8081}

spring:
  application:
    name: opsmind-auth-service

  # ── DATABASE ───────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:opsmind_auth}
    username: ${DB_USERNAME:opsmind}
    password: ${DB_PASSWORD:opsmind}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: false

  # ── FLYWAY ─────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ── KAFKA ──────────────────────────────────────────────────────────────────
  # Desabilitado por padrão — habilite em produção com kafka.enabled=true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: auth-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.opsmind.events.*"

# ── KAFKA FEATURE FLAG ────────────────────────────────────────────────────────
# true  → KafkaAuthEventAdapter ativo (broker Kafka obrigatório)
# false → NoOpAuthEventAdapter  ativo (sem dependência externa, logs em DEBUG)
kafka:
  enabled: ${KAFKA_ENABLED:false}

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:opsmind-super-secret-key-minimum-256-bits-for-hmac-sha256}
  expiration: 86400000   # 24h em ms

# ── ACTUATOR ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized

# ── LOGGING ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.opsmind_auth_service: DEBUG
    org.springframework.security: WARN
    org.springframework.kafka: INFO
    org.hibernate.SQL: WARN
