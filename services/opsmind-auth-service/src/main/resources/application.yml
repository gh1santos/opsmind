server:
  port: 8081

spring:
  application:
    name: opsmind-auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/opsmind
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus

  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.security: INFOspring.application.name=opsmind-auth-service

jwt:
  secret: ${JWT_SECRET:opsmind-super-secret-key-2026}
  expiration: 86400000
