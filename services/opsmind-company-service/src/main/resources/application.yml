server:
  port: ${COMPANY_SERVICE_PORT:8082}

spring:
  application:
    name: opsmind-company-service

  # ── BANCO DE DADOS ──────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:opsmind_company}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway gerencia o schema — nunca usar create/update aqui
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── FLYWAY ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── REDIS (cache) ────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis                    # trocar para 'simple' se Redis não disponível

  # ── KAFKA ───────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# ── KAFKA CONDICIONAL ─────────────────────────────────────────────────────────
# Setar kafka.enabled=true apenas quando Kafka estiver rodando
kafka:
  enabled: ${KAFKA_ENABLED:false}
  topics:
    company-events: company-events
    membership-events: membership-events

# ── ACTUATOR ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

# ── LOGGING ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.opsmind_company_service: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
