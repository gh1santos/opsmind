version: '3.9'

services:

  postgres:
    image: postgres:16

    container_name: opsmind-postgres

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - opsmind-network

    restart: unless-stopped

  redis:
    image: redis:7

    container_name: opsmind-redis

    ports:
      - "${REDIS_PORT}:6379"

    networks:
      - opsmind-network

    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0

    container_name: opsmind-zookeeper

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

    ports:
      - "${ZOOKEEPER_PORT}:2181"

    networks:
      - opsmind-network

    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0

    container_name: opsmind-kafka

    depends_on:
      - zookeeper

    ports:
      - "${KAFKA_PORT}:9092"

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    networks:
      - opsmind-network

    restart: unless-stopped

networks:
  opsmind-network:

volumes:
  postgres_data: